<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resume</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    .resume-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
    }
    .resume-img {
      width: 100%;
      max-width: 800px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      transition: box-shadow 0.3s ease-in-out;
    }
    .resume-img:hover {
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
    }
    .transition-container {
      position: relative;
    }
    .transition-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }
    .transition-img.active {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="resume-container">
    <div class="transition-container">
      <img src="resume1.jpg" class="resume-img transition-img active" alt="Resume 1">
      <img src="resume2.jpg" class="resume-img transition-img" alt="Resume 2">
    </div>
  </div>

  <script>
    // JavaScript to handle the transition between images
    document.addEventListener('DOMContentLoaded', function () {
      let currentIndex = 0;
      const images = document.querySelectorAll('.transition-img');
      const totalImages = images.length;
      
      function changeImage() {
        images[currentIndex].classList.remove('active');
        currentIndex = (currentIndex + 1) % totalImages;
        images[currentIndex].classList.add('active');
      }
      
      setInterval(changeImage, 5000); // Change image every 5 seconds
    });
  </script>

</body>
</html>
