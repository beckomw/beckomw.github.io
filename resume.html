  <style>
    .resume-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
    }
    .resume-img {
      width: 100%;
      max-width: 800px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      transition: box-shadow 0.3s ease-in-out;
    }
    .resume-img:hover {
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
    }
    .transition-container {
      position: relative;
    }
    .transition-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }
    .transition-img.active {
      opacity: 1;
    }
  </style>
</head>
<body>


  <nav class="navbar navbar-expand-md bg-dark sticky-top border-bottom" data-bs-theme="dark">

        Aperture
      </a>

        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvas" aria-labelledby="offcanvasLabel">
        <div class="offcanvas-header">
          <h5 class="offcanvas-title" id="offcanvasLabel">Wayne Allen Beckom</h5>
          <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
          <ul class="navbar-nav flex-grow-1 justify-content-between">
            <li class="nav-item"><a class="nav-link" href="#">
              <svg class="bi" width="24" height="24"><use xlink:href="#aperture"/></svg>
            </a></li>
            
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>

            <li class="nav-item"><a class="nav-link" href="resume.html">Resume X </a></li>

            <div class="clearfix">
              <div class="spinner-border float-end" role="status">
                <span class="visually-hidden">Loading...</span>
              </div>
            </div>

          
        
              <svg class="bi" width="24" height="24"><use xlink:href="#cart"/></svg>
            </a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>



  <div class="resume-container">
    <div class="transition-container">
      <img src="resume1.jpg" class="resume-img transition-img active" alt="Resume 1">
      <img src="resume2.jpg" class="resume-img transition-img" alt="Resume 2">
    </div>
  </div>

  <script>
    // JavaScript to handle the transition between images
    document.addEventListener('DOMContentLoaded', function () {
      let currentIndex = 0;
      const images = document.querySelectorAll('.transition-img');
      const totalImages = images.length;
      
      function changeImage() {
        images[currentIndex].classList.remove('active');
        currentIndex = (currentIndex + 1) % totalImages;
        images[currentIndex].classList.add('active');
      }
      
      setInterval(changeImage, 5000); // Change image every 5 seconds
    });
  </script>

</body>
